    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --navy: #0B2A3C;
      --navy-light: #1E4F6E;
      --gold: #C8952A;
      --gold-bright: #F0B429;
      --cream: #F5F3F0;
      --cream-warm: #FBF3E0;
      --ink: #1A1A1A;
      --ink-soft: #4A4A4A;
      --ink-light: #8A8A8A;
    }

    * { -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .font-serif { font-family: 'Cormorant Garamond', Georgia, serif; }
    .font-sans  { font-family: 'Inter', sans-serif; }

    .text-navy   { color: var(--navy); }
    .text-gold   { color: var(--gold); }
    .text-gold-bright { color: var(--gold-bright); }
    .text-ink-soft { color: var(--ink-soft); }
    .text-ink-light{ color: var(--ink-light); }

    .bg-navy     { background-color: var(--navy); }
    .bg-navy-light { background-color: var(--navy-light); }
    .bg-gold     { background-color: var(--gold); }
    .bg-gold-bright { background-color: var(--gold-bright); }
    .bg-cream    { background-color: var(--cream); }
    .bg-cream-warm { background-color: var(--cream-warm); }

    .border-gold { border-color: var(--gold); }
    .border-navy { border-color: var(--navy); }

    /* Safe area insets */
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

    /* iOS-like card */
    .ios-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    }

    /* Splash transition */
    .splash-enter { opacity: 1; }
    .splash-exit  { opacity: 0; transition: opacity 0.5s ease-out; }

    /* Scrollbars */
    ::-webkit-scrollbar { display: none; }
    .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }

    /* Tab bar blur */
    .tab-bar {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(11, 42, 60, 0.85);
    }

    /* Slide transitions */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in {
      animation: slideInRight 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    /* Splash background */
    .splash-bg {
      background: radial-gradient(ellipse at center,
                  rgba(11, 42, 60, 1) 0%,
                  rgba(11, 42, 60, 1) 60%,
                  rgba(5, 20, 30, 1) 100%);
    }

    /* Pulse for splash CTA */
    @keyframes pulse-gold {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .pulse-gold { animation: pulse-gold 2.5s ease-in-out infinite; }

    /* Selectable seat */
    .seat {
      width: 28px;
      height: 28px;
      border-radius: 6px 6px 3px 3px;
      transition: all 0.15s;
    }
    .seat-available { background: #E8E5E0; }
    .seat-selected  { background: var(--gold); transform: scale(1.1); }
    .seat-taken     { background: #C0BBB5; opacity: 0.5; }
  </style>
